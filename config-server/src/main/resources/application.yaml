spring:
  application:
    name: config-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}

---
spring:
  config:
    activate:
      on-profile: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS:file:/app/config-repo}
      fail-fast: true
      retry:
        max-attempts: ${CONFIG_SERVER_RETRY_MAX_ATTEMPTS:20}
        initial-interval: ${CONFIG_SERVER_RETRY_INITIAL_INTERVAL:3000}

server:
  port: 8888


eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
  client:
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tracing
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

---
spring:
  config:
    activate:
      on-profile: git
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_SERVER_GIT_URI:https://github.com/example/config-repo}
          search-paths: ${CONFIG_SERVER_GIT_SEARCH_PATHS:}
          username: ${CONFIG_SERVER_GIT_USERNAME:}
          password: ${CONFIG_SERVER_GIT_PASSWORD:}
          default-label: ${CONFIG_SERVER_GIT_DEFAULT_LABEL:main}
      fail-fast: true
      retry:
        max-attempts: ${CONFIG_SERVER_RETRY_MAX_ATTEMPTS:20}
        initial-interval: ${CONFIG_SERVER_RETRY_INITIAL_INTERVAL:3000}

server:
  port: 8888


eureka:
  instance:
    hostname: config-server
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://discovery-server:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tracing
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
