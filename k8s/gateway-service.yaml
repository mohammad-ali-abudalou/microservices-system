apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      # --- The magical part: Init Container ---
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.28
          command:
            - 'sh'
            - '-c'
            - |
              echo "Waiting for Config Server at config-server:8888..."
              until nc -z config-server 8888; do
                echo "Config Server not ready, waiting..."
                sleep 2
              done
              echo "Config Server is ready!"

        - name: wait-for-keycloak
          image: busybox:1.28
          command:
            - 'sh'
            - '-c'
            - |
              echo "Waiting for Keycloak at keycloak-service:8080..."
              until nc -z keycloak-service 8080; do
                echo "Keycloak not ready, waiting..."
                sleep 2
              done
              echo "Keycloak is ready!"

      containers:
        - name: gateway-service
          image: gateway-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: microservices-config
          env:
            # Override specific values if needed for this service
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-server:8888"
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
            - name: KEYCLOAK_URL
              value: "http://keycloak-service:8080"

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: NodePort
  selector:
    app: gateway-service
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30001
