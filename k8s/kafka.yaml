apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  labels:
    app: kafka
data:
  # Kafka node configuration for KRaft mode (combined broker and controller)
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: "broker,controller"
  # Listeners configuration: PLAINTEXT for client connections, CONTROLLER for internal quorum
  KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://:9093"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-service:9092"
  # Controller quorum voters for single-node KRaft setup
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
  # Topic replication settings for single-node deployment
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  # Logging configuration for production monitoring
  KAFKA_LOG4J_ROOT_LOGLEVEL: "INFO"
  KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.log=INFO,kafka.request.logger=WARN"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-service  # Required for StatefulSet
  replicas: 1  # Single replica for development; increase to 3+ for production HA
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      automountServiceAccountToken: false  # Disable automounting for security
      containers:
        - name: kafka
          image: apache/kafka:3.6.0  # Pin to specific version for reproducibility
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
          envFrom:
            - configMapRef:
                name: kafka-config  # Load configuration from ConfigMap for better maintainability
          resources:  # Resource constraints to prevent resource contention
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:  # Health check to ensure Kafka is responsive
            exec:
              command:
                - kafka-broker-api-versions.sh
                - --bootstrap-server=localhost:9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:  # Ensure Kafka is ready to accept connections
            exec:
              command:
                - kafka-broker-api-versions.sh
                - --bootstrap-server=localhost:9092
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:  # Ensure Kafka starts properly before marking as ready
            exec:
              command:
                - kafka-broker-api-versions.sh
                - --bootstrap-server=localhost:9092
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:  # Mount volume for Kafka data persistence
            - name: kafka-data
              mountPath: /tmp/kafka-logs
  volumeClaimTemplates:  # StatefulSet manages PVCs per replica
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi  # Request 10Gi for Kafka data storage
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
