apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-inventory
spec:
  selector:
    matchLabels:
      app: mysql-inventory
  template:
    metadata:
      labels:
        app: mysql-inventory
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_DATABASE
              value: mysql-inventory
            - name: MYSQL_ROOT_PASSWORD
              value: root
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-inventory
spec:
  selector:
    app: mysql-inventory
  ports:
    - port: 3306