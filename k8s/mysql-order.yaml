apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-order
spec:
  selector:
    matchLabels:
      app: mysql-order
  template:
    metadata:
      labels:
        app: mysql-order
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_DATABASE
              value: mysql-order
            - name: MYSQL_ROOT_PASSWORD
              value: root
          ports:
            - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-order
spec:
  selector:
    app: mysql-order
  ports:
    - port: 3306
      targetPort: 3306