spring.application.name=notification-service
server.port=8084

# 1. Config Server & Eureka
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.cloud.config.fail-fast=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# 2. Kafka Consumer Configuration (Clean & Secure)
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialization Setup
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=orderPlaced:org.example.notificationservice.event.OrderPlacedEvent

# 3. Security (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master/protocol/openid-connect/certs

# 4. Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Use IP address instead of hostname
eureka.instance.prefer-ip-address=true

# Hostname configuration
eureka.instance.hostname=localhost

# =================================================================
# KAFKA CONFIGURATION
# =================================================================
# Kafka bootstrap servers - Points to Kafka container in Docker environment
spring.kafka.bootstrap-servers=localhost:9092
# Producer Configuration - Convert objects to JSON when sending
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Send "orderPlaced" tag instead of full class path for better decoupling
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
