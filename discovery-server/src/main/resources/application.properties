spring.application.name=discovery-server
server.port=8761

# 1. Config Server Connection
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.cloud.config.fail-fast=true
spring.cloud.config.username=admin
spring.cloud.config.password=admin

# 2. Eureka Server Specific Settings
# Tell Eureka that it is the server and does not need to register itself with anyone
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# 3. Observability & Tracing
management.endpoints.web.exposure.include=health,info,prometheus,tracing
management.endpoint.health.show-details=always
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.metrics.tags.application=${spring.application.name}

# 4. Security (Keycloak for Dashboard protection if needed)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master
spring.security.user.name=admin
spring.security.user.password=admin

# Use IP address instead of hostname
eureka.instance.prefer-ip-address=true

# Hostname configuration
eureka.instance.hostname=localhost
