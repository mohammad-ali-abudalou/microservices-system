# =================================================================
# ORDER SERVICE CONFIGURATION
# =================================================================

# 1. Application Identity - Must exactly match the filename in Config Server
spring.application.name=order-service

# 2. Configuration Import - Enable settings import (this line is crucial in Spring Boot 3)
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# 3. Config Server Connection - Enable fail-fast on connection failures
spring.cloud.config.fail-fast=true

# 4. Server Port - Optional here as the server will assign port 8082 as shown in diagrams
server.port=8082

# =================================================================
# KAFKA CONFIGURATION
# =================================================================

# Kafka bootstrap servers - Points to Kafka container in Docker environment
spring.kafka.bootstrap-servers=localhost:9092

# Producer Configuration - Convert objects to JSON when sending
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Send "orderPlaced" tag instead of full class path for better decoupling
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=orderPlaced:org.example.orderservice.event.OrderPlacedEvent

# =================================================================
# ACTUATOR & MONITORING
# =================================================================

# Expose all monitoring endpoints (development only)
management.endpoints.web.exposure.include=*

# Enable detailed health information display
management.endpoint.health.show-details=always

# This line makes the application name appear automatically in Grafana
management.metrics.tags.application=${spring.application.name}

# =================================================================
# CONFIG SERVER CREDENTIALS
# =================================================================

spring.cloud.config.username=admin
spring.cloud.config.password=admin

# =================================================================
# DATABASE CONFIGURATION
# =================================================================

# Connects to localhost in IntelliJ, container name when running in Docker
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3308/order_service
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update

# Ensure best compatibility with MySQL 8+ inside Docker containers
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# =================================================================
# SECURITY CONFIGURATION
# =================================================================

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master

# =================================================================
# SERVICE DISCOVERY
# =================================================================

eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# Use IP address instead of hostname
eureka.instance.prefer-ip-address=true

# Hostname configuration
eureka.instance.hostname=localhost
