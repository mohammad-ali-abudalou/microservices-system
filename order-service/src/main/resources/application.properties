# 1. يجب أن يطابق تماماً اسم الملف في الـ Config Server
spring.application.name=order-service
# 2. تفعيل استيراد الإعدادات (هذا السطر هو الأهم في Spring Boot 3)
spring.config.import=optional:configserver:http://config-server:8888
# 3. محاولات إعادة الاتصال
spring.cloud.config.fail-fast=true
# 4. إعدادات المنفذ (اختياري هنا لأن السيرفر سيعطيه منفذ 8081 كما رأينا في الصور)
server.port=8082
# عنوان خادم كافكا
spring.kafka.bootstrap-servers=kafka-1:9092
# تحويل الكائنات إلى JSON عند الإرسال
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# إرسال علامة "orderPlaced" بدلاً من المسار الكامل للكلاس
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=orderPlaced:org.example.orderservice.event.OrderPlacedEvent
# إظهار جميع نقاط المراقبة (للتطوير فقط)
management.endpoints.web.exposure.include=*
# تفعيل تتبع البيانات وإرسالها
management.endpoint.health.show-details=always
# هذا السطر هو الذي سيجعل الاسم يظهر في Grafana أوتوماتيكياً
management.metrics.tags.application=${spring.application.name}
spring.cloud.config.username=admin
spring.cloud.config.password=admin
spring.datasource.url=jdbc:mysql://host.docker.internal:3308/order_service
spring.datasource.username=root
spring.datasource.password=root
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/master/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/master
eureka.client.serviceUrl.defaultZone=http://discovery-server:8761/eureka/
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update