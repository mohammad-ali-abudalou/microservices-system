spring.application.name=order-service
server.port=8082
# Database Configuration
# Connects to localhost in IntelliJ, container name when running in Docker
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/order_service
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
# Ensure best compatibility with MySQL 8+ inside Docker containers
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Eureka
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
# Security - Use environment variable for Keycloak URL
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/master/protocol/openid-connect/certs
# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-1:29092}
# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# Use IP address instead of hostname
eureka.instance.prefer-ip-address=true
# Hostname configuration
eureka.instance.hostname=localhost
