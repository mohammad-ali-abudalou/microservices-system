services:
  # --- Infrastructure Services ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spring-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:29092
    networks:
      - spring-network

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - spring-network

  # --- Your Java Microservices ---

  discovery-server:
    image: discovery-server:v1
    container_name: discovery-server
    build: ./discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CLOUD_CONFIG_ENABLED=false # نلغي اعتماده على config-server ليبدأ فوراً
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - MANAGEMENT_TRACING_ENABLED=false # نعطله هنا لضمان استقرار Eureka
    networks:
      - spring-network

  config-server:
    image: config-server:v1
    container_name: config-server
    build: ./config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server # حذفنا شرط service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=https://github.com/your-username/your-config-repo
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/app/config-repo
    networks:
      - spring-network
    volumes:
      - "D:/Users/moham/source/microservices-system/config-repo:/app/config-repo"
    healthcheck:
      test: [ "CMD-SHELL", "java -version || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: gateway-service:v1
    container_name: gateway-service
    build: ./api-gateway
    ports:
      - "9000:9000"
    depends_on:
      config-server:
        condition: service_healthy # انتظر حتى يصبح السيرفر "سليماً"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000 # تأكد أن Max > Initial
    networks:
      - spring-network

  inventory-service:
    image: inventory-service:v1
    container_name: inventory-service
    build: ./inventory-service
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy # انتظر حتى يصبح السيرفر "سليماً"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - spring-network

  order-service:
    image: order-service:v1
    container_name: order-service
    build: ./order-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy # انتظر حتى يصبح السيرفر "سليماً"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - spring-network

  notification-service:
    image: notification-service:v1
    container_name: notification-service
    build: ./notification-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy # انتظر حتى يصبح السيرفر "سليماً"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL=3000
      - SPRING_CLOUD_CONFIG_RETRY_MAX_INTERVAL=10000
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - spring-network

  kafdrop:
    image: obsidiandynamics/kafdrop
    ports:
      - "9010:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka-1:29092"
    depends_on:
      - kafka
    networks:
      - spring-network


  keycloak:
    container_name: keycloak  # هذا الاسم هو الذي تبحث عنه البوابة
    image: quay.io/keycloak/keycloak:latest # أو النسخة التي تستخدمها
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false # مهم جداً للتجربة المحلية
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
    networks:
      - spring-network # يجب أن تكون نفس شبكة api-gateway


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - spring-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - spring-network

networks:
  spring-network:
    driver: bridge



